name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "examples/**"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'pyproject.toml'
              - 'python/**'
              - 'tests/**'
              - '.github/workflows/**'
              - 'deny.toml'
              - 'rustfmt.toml'

  # ── Required checks ────────────────────────────────────────────────────────
  # These jobs always run (no job-level `if:`) so that GitHub reports them as
  # "success" even on docs-only PRs.  The expensive steps are guarded by
  # `if: needs.changes.outputs.code == 'true'` so they only execute when
  # source files actually changed.

  check:
    name: Check
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.code == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.code == 'true'
      - run: cargo check --all-targets
        if: needs.changes.outputs.code == 'true'

  fmt:
    name: Format
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.code == 'true'
        with:
          components: rustfmt
      - run: cargo fmt --all --check
        if: needs.changes.outputs.code == 'true'

  clippy:
    name: Clippy
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.code == 'true'
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.code == 'true'
      - run: cargo clippy --all-targets -- -D warnings
        if: needs.changes.outputs.code == 'true'
      - run: cargo clippy --all-targets --features python -- -D warnings
        if: needs.changes.outputs.code == 'true'

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'
      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.code == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.code == 'true'
      - run: cargo test --all-targets
        if: needs.changes.outputs.code == 'true'
      # Test with python feature to catch non-exhaustive matches in python.rs.
      # Use --lib only: --all-targets would also build the cdylib which
      # requires libpython linkage that is not available in the plain Rust CI
      # environment (maturin handles that separately in publish-pypi.yml).
      - run: cargo test --lib --features python
        if: needs.changes.outputs.code == 'true'
      - run: cargo test --doc
        if: needs.changes.outputs.code == 'true'

  # ── Non-required checks ──────────────────────────────────────────────────
  # These can use job-level `if:` since they are not in the branch ruleset.

  audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm cargo-audit
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ github.run_id }}
          restore-keys: advisory-db-
      - run: cargo audit

  deny:
    name: Cargo Deny
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
        continue-on-error: true  # advisory until deny.toml is tuned
