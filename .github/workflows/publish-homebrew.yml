name: Update Homebrew Tap

on:
  workflow_run:
    workflows: ["Release Binaries"]
    types: [completed]

jobs:
  update-tap:
    name: Update homebrew-tap formula
    runs-on: macos-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get release info
        id: release
        run: |
          VERSION=$(gh release view --repo lthoangg/secretsh --json tagName --jq '.tagName | ltrimstr("v")')
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release binaries
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TAG="${{ steps.release.outputs.tag }}"
          REPO="lthoangg/secretsh"

          curl -sfL "https://github.com/${REPO}/releases/download/${TAG}/secretsh-aarch64-apple-darwin.tar.gz" -o aarch64-darwin.tar.gz
          curl -sfL "https://github.com/${REPO}/releases/download/${TAG}/secretsh-x86_64-apple-darwin.tar.gz" -o x86_64-darwin.tar.gz
          curl -sfL "https://github.com/${REPO}/releases/download/${TAG}/secretsh-aarch64-unknown-linux-gnu.tar.gz" -o aarch64-linux.tar.gz
          curl -sfL "https://github.com/${REPO}/releases/download/${TAG}/secretsh-x86_64-unknown-linux-gnu.tar.gz" -o x86_64-linux.tar.gz

      - name: Compute SHA-256 hashes
        id: hashes
        run: |
          echo "arm64_darwin=$(shasum -a 256 aarch64-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "intel_darwin=$(shasum -a 256 x86_64-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "arm64_linux=$(shasum -a 256 aarch64-linux.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "intel_linux=$(shasum -a 256 x86_64-linux.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: lthoangg/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TAG="${{ steps.release.outputs.tag }}"
          REPO="lthoangg/secretsh"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          cat > homebrew-tap/Formula/secretsh.rb <<FORMULA
          class Secretsh < Formula
            desc "Secure subprocess secret injection for AI agents"
            homepage "https://github.com/lthoangg/secretsh"
            version "${VERSION}"
            license "MIT"

            on_arm do
              if OS.mac?
                url "${BASE_URL}/secretsh-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.hashes.outputs.arm64_darwin }}"
              else
                url "${BASE_URL}/secretsh-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.hashes.outputs.arm64_linux }}"
              end
            end

            on_intel do
              if OS.mac?
                url "${BASE_URL}/secretsh-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.hashes.outputs.intel_darwin }}"
              else
                url "${BASE_URL}/secretsh-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.hashes.outputs.intel_linux }}"
              end
            end

            def install
              bin.install "secretsh"
            end

            test do
              assert_match "secretsh", shell_output("\#{bin}/secretsh --version")
            end
          end
          FORMULA

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/secretsh.rb
          git diff --cached --quiet && echo "No changes, skipping" || (git commit -m "secretsh ${{ steps.release.outputs.tag }}" && git push)
