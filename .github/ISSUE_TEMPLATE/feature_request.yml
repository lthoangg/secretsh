name: Feature Request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What workflow is painful?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should secretsh address this?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - Vault / Crypto
        - Tokenizer / Parser
        - Output Redaction
        - CLI / UX
        - Process Spawning
        - Python Bindings
        - Documentation
        - CI / Build
        - Other
    validations:
      required: true
